<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Emmre's Rollercoaster Simulator</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: #1a1d24;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --border: #334155;
            --success: #10b981;
            --success-hover: #059669;
            --info: #6366f1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
            touch-action: manipulation;
            user-select: none;
        }

        /* Loading Screen Overlay */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        select, option, input { user-select: text; }

        .top-bar {
            width: 100%;
            max-width: 1500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .top-bar h1 { color: var(--accent); margin: 0; font-size: clamp(20px, 4vw, 30px); }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            width: 100%;
            max-width: 1500px;
            justify-content: center;
            flex: 1;
            align-items: flex-start;
        }

        .controls {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            box-sizing: border-box;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #64748b #1a1d24;
        }

        .controls::-webkit-scrollbar { width: 6px; }
        .controls::-webkit-scrollbar-thumb { background: #64748b; border-radius: 3px; }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: -4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            flex-shrink: 0;
            margin-top: 8px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 13.5px; font-weight: 600; color: #cbd5e1; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #0f1115;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .input-group input[type="color"] { padding: 4px; height: 42px; cursor: pointer; }

        .grid-inputs { display: flex; gap: 12px; width: 100%; }
        .grid-inputs .input-group { flex: 1; min-width: 0; }

        .checkbox-group {
            display: flex; align-items: center; gap: 12px;
            background: #0f1115; padding: 10px 12px;
            border-radius: 8px; border: 1px solid var(--border);
        }
        .checkbox-group input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

        button {
            background-color: var(--accent); color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600;
            transition: all 0.25s; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            flex-shrink: 0; margin-top: 6px;
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        button:active { transform: scale(0.97); }

        .btn-reset { background-color: #f59e0b; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .btn-reset:hover { background-color: #d97706; }

        .btn-analysis { background-color: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-analysis:hover { background-color: var(--success-hover); }

        .canvas-wrapper {
            flex: 1 1 700px;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .canvas-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            min-height: 600px;
            max-height: 75vh;
            position: relative;
            overflow: auto; /* Handles native panning */
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            display: block;
            touch-action: pan-x pan-y; /* Improves scroll behaviour on mobile */
        }
        canvas { display: block; transform-origin: top left; }

        .zoom-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .zoom-controls button {
            margin: 0;
            padding: 10px 20px;
            background: #334155;
            font-size: 14px;
            box-shadow: none;
            flex: 1;
            min-width: 100px;
        }
        .zoom-controls button:hover { background: #475569; transform: none; }
        .zoom-controls button:active { transform: scale(0.95); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); z-index: 10000;
            justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--panel-bg); padding: 32px; border-radius: 16px;
            border: 1px solid var(--border); width: 100%; max-width: 900px;
            max-height: 92vh; overflow-y: auto;
            box-shadow: 0 30px 70px -10px rgba(0, 0, 0, 0.8);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 24px;
        }
        .modal-header h2 { margin: 0; color: var(--accent); font-size: 26px; }
        .close-btn {
            background: none; color: white; font-size: 32px; border: none;
            cursor: pointer; padding: 4px 10px; border-radius: 50%;
        }
        .close-btn:hover { color: var(--accent); background: rgba(239, 68, 68, 0.2); }

        .analysis-section { margin-bottom: 30px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .analysis-header { background: #1e293b; padding: 12px 20px; font-weight: bold; font-size: 18px; color: white; }
        .answers-box { background: rgba(239, 68, 68, 0.08); padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .answers-box p { margin: 6px 0; font-size: 15px; }
        
        table { width: 100%; border-collapse: collapse; background: #0f1115; }
        th, td { border: 1px solid var(--border); padding: 12px 10px; text-align: center; font-size: 14.5px; }
        th { background-color: #1e293b; color: var(--accent); font-weight: 600; }

        @media (max-width: 900px) {
            .container { flex-direction: column; align-items: stretch; }
            .controls { max-width: 100%; max-height: none; overflow-y: visible; }
            .canvas-container { min-height: 460px; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Loading Assets... <span id="loadProgress">0%</span></div>
    </div>

    <div class="top-bar">
        <h1>Emmre's Rollercoaster Simulator</h1>
    </div>

    <div class="container">
        <div class="controls" id="controlsPanel">
            
            <div class="section-title" style="margin-top: 0;">Environment</div>
            <div class="input-group">
                <label>Simulation Background</label>
                <select id="bgSelect" onchange="if(!isSimulating) drawStatic();">
                    <option value="night">Night Sky</option>
                    <option value="afternoon">Afternoon</option>
                    <option value="sunny" selected>Sunny</option>
                </select>
            </div>

            <div class="section-title">Object Properties</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Sprite Asset</label>
                    <select id="spriteSelect" onchange="if(!isSimulating) drawStatic();">
                        <option value="cart" selected>Cart</option>
                        <option value="train">Train</option>
                        <option value="knuckles">Knuckles</option>
                        <option value="shadow">Shadow</option>
                        <option value="sonic">Sonic</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Object Mass (kg)</label>
                    <input type="number" id="mass" min="1" value="500">
                </div>
            </div>

            <div class="checkbox-group" style="margin-top: 12px; margin-bottom: 6px;">
                <input type="checkbox" id="checkFollow" checked>
                <label for="checkFollow">Follow Object</label>
            </div>

            <div class="section-title">Linear Motion 1</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Acceleration (m/s²)</label>
                    <input type="number" id="lin1_a" step="any" min="0.1" value="3" onchange="drawStatic();">
                </div>
                <div class="input-group">
                    <label>Distance (m)</label>
                    <input type="number" id="lin1_d" step="any" min="1" value="90" onchange="drawStatic();">
                </div>
            </div>

            <div class="section-title">Projectile Motion - Type 1</div>
            <div class="input-group">
                <label>Drop Height (m)</label>
                <input type="number" id="drop_h" step="any" min="1" value="60" onchange="drawStatic();">
            </div>

            <div class="section-title">Linear Motion 2</div>
            <div class="input-group">
                <label>Distance (m)</label>
                <input type="number" id="lin2_d" step="any" min="1" value="50" onchange="drawStatic();">
            </div>

            <div class="section-title">Circular Motion</div>
            <div class="input-group">
                <label>Loop Radius (m)</label>
                <input type="number" id="loop_r" step="any" min="5" value="20" onchange="drawStatic();">
            </div>

            <div class="section-title">Simulation Settings</div>
            
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Path Color</label>
                    <input type="color" id="pathColor" value="#3b82f6" onchange="if(!isSimulating) drawStatic();">
                </div>
                <div class="input-group">
                    <label>Trajectory Color</label>
                    <input type="color" id="trajColor" value="#ef4444" onchange="if(!isSimulating) drawStatic();">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="checkTrail" onchange="toggleTrailSettings()" checked>
                <label for="checkTrail">Show Position Per Time</label>
            </div>

            <div id="trailSettings" style="display: flex; flex-direction: column; gap: 12px; padding-left: 12px;">
                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Secs/Interval</label>
                        <input type="number" id="inputInterval" step="0.1" min="0.1" value="0.5">
                    </div>
                    <div class="input-group">
                        <label>Text Size (px)</label>
                        <input type="number" id="labelFontSize" min="8" max="32" value="11" onchange="if(!isSimulating) drawStatic();">
                    </div>
                </div>
                
                <label style="font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom:-4px;">Vertical Spacing Interval</label>
                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Starting</label>
                        <input type="number" id="vspace_start" step="1" value="15" onchange="if(!isSimulating) drawStatic();">
                    </div>
                    <div class="input-group">
                        <label>Repeat</label>
                        <input type="number" id="vspace_repeat" step="1" min="1" value="5" onchange="if(!isSimulating) drawStatic();">
                    </div>
                    <div class="input-group">
                        <label>Spacing</label>
                        <input type="number" id="vspace_inc" step="1" value="50" onchange="if(!isSimulating) drawStatic();">
                    </div>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="checkTrajectory" onchange="if(!isSimulating) drawStatic();" checked>
                <label for="checkTrajectory">Show Trajectory</label>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="checkGrid" onchange="if(!isSimulating) drawStatic();" checked>
                <label for="checkGrid">Show Grid</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="checkAutoGrid" onchange="toggleAutoGrid(); if(!isSimulating) drawStatic();" checked>
                <label for="checkAutoGrid">Automatic Grid Spacing</label>
            </div>

            <div class="grid-inputs">
                <div class="input-group">
                    <label>Grid Horiz (m)</label>
                    <input type="number" id="gridX" min="1" value="20" onchange="if(!isSimulating) drawStatic();">
                </div>
                <div class="input-group">
                    <label>Grid Vert (m)</label>
                    <input type="number" id="gridY" min="1" value="20" onchange="if(!isSimulating) drawStatic();">
                </div>
            </div>

            <div class="grid-inputs">
                <div class="input-group">
                    <label>Decimal Places</label>
                    <input type="number" id="decimalPlaces" min="0" max="4" value="2" onchange="if(!isSimulating) drawStatic();">
                </div>
                <div class="input-group">
                    <label>Rounding</label>
                    <select id="roundingMode" onchange="if(!isSimulating) drawStatic();">
                        <option value="nearest" selected>Nearest</option>
                        <option value="floor">Floor</option>
                        <option value="ceil">Ceiling</option>
                    </select>
                </div>
            </div>

            <button onclick="startSimulation()">Start Simulation</button>
            <button class="btn-reset" onclick="resetSimulation()">Reset</button>
            <button class="btn-analysis" onclick="showAnalysis()">Show Motion Analysis</button>
        </div>

        <div class="canvas-wrapper">
            <div class="canvas-container" id="simContainer">
                <canvas id="simCanvas"></canvas>
            </div>
            
            <div class="zoom-controls">
                <button onclick="zoomIn()">🔍 Zoom In</button>
                <button onclick="zoomOut()">🔍 Zoom Out</button>
                <button onclick="resetZoom()">Reset Zoom</button>
            </div>
        </div>
    </div>

    <div id="analysisModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Motion Analysis Output</h2>
                <button class="close-btn" onclick="document.getElementById('analysisModal').style.display='none'">&times;</button>
            </div>
            <div id="analysisContent"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const container = document.getElementById('simContainer');
        const ctx = canvas.getContext('2d');
        const g = 9.8; 

        // Asset Management
        const assetPaths = {
            train: 'Materials/Sprites_Train(1000x1000).png',
            cart: 'Materials/Sprites_Cart(1000x1000).png',
            knuckles: 'Materials/Sprites_Knuckles(1000x1000).png',
            knucklesBall: 'Materials/Sprites_Knuckles_Ball(1000x1000).png',
            shadow: 'Materials/Sprites_Shadow(1000x1000).png',
            shadowBall: 'Materials/Sprites_Shadow_Ball(1000x1000).png',
            sonic: 'Materials/Sprites_Sonic(1000x1000).png',
            sonicBall: 'Materials/Sprites_Sonic_Ball(1000x1000).png',
            night: 'Materials/BG_Night(1536x1024).png',
            afternoon: 'Materials/BG_Afternoon(1536x1024).png',
            sunny: 'Materials/BG_Sunny(1536x1024).png'
        };
        const images = {};

        // Application State
        let isSimulating = false;
        let t = 0;
        let trails = [];
        let nextTrailTime = 0;
        let reqAnimFrame, lastDrawTime = 0;
        const timeScale = 1.0; 

        // Kinematic States
        let T0=0, T1, T2, T3, T4, T5;
        let X1, Y1, X2, Y2, X3, Y3, X4, Y4, X5;
        let v1, v_trans;
        let max_x, max_y;

        // Viewport Settings
        let padX = 60, padY = 80;
        let scale = 1, offsetX = 0, offsetY = 0;
        let cssWidth = 0, cssHeight = 0;
        let zoomLevel = 1.0;

        // Ensure Preloader loads all assets first before executing rendering script
        window.onload = () => {
            let loadedCount = 0;
            const assetKeys = Object.keys(assetPaths);
            const totalAssets = assetKeys.length;

            if (totalAssets === 0) {
                initApp();
                return;
            }

            const promises = assetKeys.map(key => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        loadedCount++;
                        document.getElementById('loadProgress').innerText = Math.round((loadedCount / totalAssets) * 100) + '%';
                        images[key] = img;
                        resolve();
                    };
                    img.onerror = () => {
                        console.warn('Failed to load: ' + assetPaths[key]);
                        loadedCount++; // We still increment to avoid infinite loading screens if a file is missing
                        document.getElementById('loadProgress').innerText = Math.round((loadedCount / totalAssets) * 100) + '%';
                        images[key] = img;
                        resolve();
                    };
                    img.src = assetPaths[key];
                });
            });

            Promise.all(promises).then(() => {
                const loader = document.getElementById('loadingScreen');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    initApp();
                }, 400);
            });
        };

        function initApp() {
            toggleAutoGrid(); 
            toggleTrailSettings();
            drawStatic();
            setupTouchAndWheelZoom();
            setTimeout(focusOnStart, 100); // Focus on the object directly at startup
        }

        // Centers the viewport on the starting position of the object
        function focusOnStart() {
            if (T1 === undefined) calculateLimits();
            let st = getState(0);
            let px = offsetX + st.x * scale;
            let py = offsetY - st.y * scale;
            container.scrollLeft = px - container.clientWidth / 2;
            container.scrollTop = py - container.clientHeight / 2;
        }

        // Better Zooming Mechanism - Maintains the position being scaled
        function applyZoom(zoomCenterRatioX = null, zoomCenterRatioY = null) {
            let oldW = cssWidth || container.clientWidth;
            let oldH = cssHeight || container.clientHeight;

            // Find scroll percentage ratio relative to center of viewport
            let cx = zoomCenterRatioX !== null ? zoomCenterRatioX : (container.scrollLeft + container.clientWidth / 2) / oldW;
            let cy = zoomCenterRatioY !== null ? zoomCenterRatioY : (container.scrollTop + container.clientHeight / 2) / oldH;

            updateScaling(); // Adjusts cssWidth and cssHeight based on new zoomLevel

            if (isSimulating) drawSim(); else drawStatic();
            
            // Re-apply viewport centering seamlessly
            if (!isSimulating || !document.getElementById('checkFollow').checked) {
                container.scrollLeft = (cx * cssWidth) - (container.clientWidth / 2);
                container.scrollTop = (cy * cssHeight) - (container.clientHeight / 2);
            }
        }

        function zoomIn() { zoomLevel = Math.min(zoomLevel * 1.25, 5.0); applyZoom(); }
        function zoomOut() { zoomLevel = Math.max(zoomLevel * 0.8, 0.4); applyZoom(); }
        function resetZoom() { zoomLevel = 1.0; applyZoom(); focusOnStart(); }

        // Touch & Wheel Listeners for robust Cross-Platform Scaling
        function setupTouchAndWheelZoom() {
            // Mouse Wheel / Trackpad (Ctrl + Scroll)
            container.addEventListener('wheel', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                    let rect = container.getBoundingClientRect();
                    let mouseX = e.clientX - rect.left + container.scrollLeft;
                    let mouseY = e.clientY - rect.top + container.scrollTop;
                    
                    let cx = mouseX / cssWidth;
                    let cy = mouseY / cssHeight;

                    if (e.deltaY < 0) zoomLevel = Math.min(zoomLevel * 1.1, 5.0); // Zoom In
                    else zoomLevel = Math.max(zoomLevel * 0.9, 0.4); // Zoom Out
                    
                    applyZoom(cx, cy);
                }
            }, { passive: false });

            // Touch Screen Pinch-To-Zoom (Tablets, Androids, iOS)
            let initialPinchDist = null;
            let initialZoom = 1.0;
            container.addEventListener('touchstart', (e) => {
                if(e.touches.length === 2) {
                    initialPinchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    initialZoom = zoomLevel;
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if(e.touches.length === 2 && initialPinchDist) {
                    e.preventDefault(); // Stop native page zooming
                    let dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    let scaleChange = dist / initialPinchDist;
                    zoomLevel = Math.max(0.4, Math.min(initialZoom * scaleChange, 5.0));
                    
                    let rect = container.getBoundingClientRect();
                    let touchCX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left + container.scrollLeft;
                    let touchCY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top + container.scrollTop;
                    
                    applyZoom(touchCX / cssWidth, touchCY / cssHeight);
                }
            }, { passive: false });
        }

        // Utility Methods
        function customRound(num, dp, mode) {
            if (isNaN(num)) return 0;
            const factor = Math.pow(10, dp);
            if (mode === "floor") return Math.floor(num * factor) / factor;
            if (mode === "ceil") return Math.ceil(num * factor) / factor;
            return Math.round(num * factor) / factor;
        }

        function formatValue(num, dp) {
            const mode = document.getElementById('roundingMode').value;
            return customRound(num, dp, mode).toFixed(dp);
        }

        function toggleTrailSettings() {
            document.getElementById('trailSettings').style.display = 
                document.getElementById('checkTrail').checked ? 'flex' : 'none';
        }

        function toggleAutoGrid() {
            const auto = document.getElementById('checkAutoGrid').checked;
            document.getElementById('gridX').disabled = auto;
            document.getElementById('gridY').disabled = auto;
        }

        // Math Bounds calculation
        function calculateLimits() {
            let a1 = parseFloat(document.getElementById('lin1_a').value) || 3;
            let d1 = parseFloat(document.getElementById('lin1_d').value) || 90;
            let drop_h = parseFloat(document.getElementById('drop_h').value) || 60;
            let d2 = parseFloat(document.getElementById('lin2_d').value) || 50;
            let loop_r = parseFloat(document.getElementById('loop_r').value) || 20;
            
            // Phase 1 (Linear 1)
            let t1 = Math.sqrt((2 * d1) / a1);
            v1 = a1 * t1;
            T1 = t1; Y1 = drop_h; X1 = d1;
            
            // Phase 2 (Projectile)
            let t2 = Math.sqrt((2 * drop_h) / g); 
            let drop_w = v1 * t2; 
            let vy2 = g * t2; 
            v_trans = Math.sqrt(v1*v1 + vy2*vy2);
            
            T2 = T1 + t2; X2 = X1 + drop_w; Y2 = 0;
            
            // Phase 3 (Linear 2)
            let t3 = d2 / v_trans;
            T3 = T2 + t3; X3 = X2 + d2; Y3 = 0;
            
            // Phase 4 (Circular)
            let t4 = (2 * Math.PI * loop_r) / v_trans;
            T4 = T3 + t4; X4 = X3; 
            
            // Phase 5 (Forward Exit)
            T5 = T4 + (50 / v_trans); 
            X5 = X4 + 50;

            max_x = X5 + 20;
            max_y = Math.max(Y1, loop_r * 2.5) + 30; 
        }

        function getState(time) {
            let a1 = parseFloat(document.getElementById('lin1_a').value) || 3;
            let drop_h = parseFloat(document.getElementById('drop_h').value) || 60;
            let loop_r = parseFloat(document.getElementById('loop_r').value) || 20;

            if (time <= T1) {
                return { x: 0.5 * a1 * time * time, y: Y1, phase: 1 };
            } else if (time <= T2) {
                let dt = time - T1;
                return { x: X1 + v1 * dt, y: Math.max(0, Y1 - 0.5 * g * dt * dt), phase: 2 };
            } else if (time <= T3) {
                let dt = time - T2;
                return { x: X2 + v_trans * dt, y: 0, phase: 3 };
            } else if (time <= T4) {
                let dt = time - T3;
                let omega_c = v_trans / loop_r;
                let deg = (omega_c * dt * 180 / Math.PI) % 360;
                return { x: X4 + loop_r * Math.sin(omega_c * dt), y: loop_r - loop_r * Math.cos(omega_c * dt), phase: 4, deg: deg };
            } else {
                let dt = time - T4;
                return { x: X4 + v_trans * dt, y: 0, phase: 5 };
            }
        }

        function updateScaling() {
            let cw = container.clientWidth - 4; 
            let ch = container.clientHeight - 4;

            let scaleX = cw / max_x;
            let scaleY = ch / max_y;
            
            let baseScale = Math.min(scaleX, scaleY) * 0.9; 
            if (baseScale < 2) baseScale = 2;
            baseScale *= zoomLevel;

            let extraPadX = 1500 * zoomLevel;
            let extraPadY = 1500 * zoomLevel;

            cssWidth = Math.max(cw, max_x * baseScale + padX * 2 + extraPadX);
            cssHeight = Math.max(ch, max_y * baseScale + padY * 2 + extraPadY);

            canvas.style.width = cssWidth + 'px';
            canvas.style.height = cssHeight + 'px';

            const dpr = window.devicePixelRatio || 1;
            canvas.width = cssWidth * dpr;
            canvas.height = cssHeight * dpr;

            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(dpr, dpr);

            scale = baseScale;
            offsetX = padX + extraPadX / 3;
            offsetY = cssHeight - padY - extraPadY / 2;
        }

        function startSimulation() {
            cancelAnimationFrame(reqAnimFrame);
            calculateLimits();
            t = 0; trails = []; nextTrailTime = 0;
            isSimulating = true;
            lastDrawTime = performance.now();
            updateScaling();
            
            // Focus on start position regardless of checkFollow 
            focusOnStart();
            
            reqAnimFrame = requestAnimationFrame(updateSim);
        }

        function resetSimulation() {
            cancelAnimationFrame(reqAnimFrame);
            isSimulating = false;
            t = 0; trails = []; nextTrailTime = 0;
            drawStatic();
            focusOnStart();
        }

        function updateSim(timestamp) {
            if(!isSimulating) return;
            let dt = (timestamp - lastDrawTime) / 1000; 
            lastDrawTime = timestamp;
            t += dt * timeScale;

            let showTrail = document.getElementById('checkTrail').checked;
            let intervalTime = parseFloat(document.getElementById('inputInterval').value) || 0.5;

            if (showTrail) {
                while (t >= nextTrailTime && nextTrailTime <= T5) {
                    let st = getState(nextTrailTime);
                    trails.push({ t: nextTrailTime, ...st });
                    nextTrailTime += intervalTime;
                }
            }

            if (t >= T5) {
                t = T5;
                isSimulating = false; 
            }

            drawSim();
            if (isSimulating) reqAnimFrame = requestAnimationFrame(updateSim);
        }

        function regenerateTrails() {
            trails = [];
            let intervalTime = parseFloat(document.getElementById('inputInterval').value) || 0.5;
            let tempTime = 0;
            
            while (tempTime <= t) {
                let st = getState(tempTime);
                trails.push({ t: tempTime, ...st });
                tempTime += intervalTime;
            }
            nextTrailTime = tempTime;
        }

        function drawGridAndAxes() {
            if (!document.getElementById('checkGrid').checked) return;

            let unitX = Math.max(parseFloat(document.getElementById('gridX').value) || 20, 1);
            let unitY = Math.max(parseFloat(document.getElementById('gridY').value) || 20, 1);
            
            if (document.getElementById('checkAutoGrid').checked) {
                const niceUnits = [1, 5, 10, 20, 50, 100, 200];
                unitX = niceUnits.find(u => u * 8 >= max_x) || 50;
                unitY = niceUnits.find(u => u * 6 >= max_y) || 20;
            }

            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(45, 55, 72, 0.7)';
            ctx.fillStyle = '#94a3b8';
            ctx.font = '14px Segoe UI';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';

            for (let x_val = 0; x_val <= max_x; x_val += unitX) {
                let px = offsetX + x_val * scale;
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, cssHeight); ctx.stroke();
                ctx.fillText(x_val, px, offsetY + 15);
            }

            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            for (let y_val = 0; y_val <= max_y; y_val += unitY) {
                let py = offsetY - y_val * scale;
                ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(cssWidth, py); ctx.stroke();
                ctx.fillText(y_val, offsetX - 15, py);
            }

            ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(71, 85, 105, 0.9)';
            ctx.beginPath(); ctx.moveTo(0, offsetY); ctx.lineTo(cssWidth, offsetY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(offsetX, 0); ctx.lineTo(offsetX, cssHeight); ctx.stroke();
        }

        function drawFullTrack(color, width, upToTime) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            let st = getState(0);
            ctx.moveTo(offsetX + st.x * scale, offsetY - st.y * scale);
            for(let scanT = 0.05; scanT <= upToTime; scanT += 0.05) {
                let p = getState(scanT);
                ctx.lineTo(offsetX + p.x * scale, offsetY - p.y * scale);
            }
            ctx.stroke();
        }

        function drawSim() {
            ctx.clearRect(0, 0, cssWidth, cssHeight);

            let bgVal = document.getElementById('bgSelect').value;
            let bgImg = images[bgVal]; 

            if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
                // Split background drawing so the track's floor (offsetY) matches the image's visual horizon
                const horizonRatio = 0.85; // Roughly 85% down from the top based on provided images
                const srcHorizonY = bgImg.naturalHeight * horizonRatio;
                const srcGroundHeight = bgImg.naturalHeight - srcHorizonY;
                
                // Draw sky mapped from canvas top down to offsetY
                ctx.drawImage(bgImg, 
                    0, 0, bgImg.naturalWidth, srcHorizonY, 
                    0, 0, cssWidth, offsetY);
                
                // Draw ground mapped from offsetY down to the bottom of the canvas
                if (cssHeight > offsetY) {
                    ctx.drawImage(bgImg, 
                        0, srcHorizonY, bgImg.naturalWidth, srcGroundHeight, 
                        0, offsetY, cssWidth, cssHeight - offsetY);
                }
            }

            drawGridAndAxes();

            let pathColor = document.getElementById('pathColor').value || "#3b82f6";
            let trajColor = document.getElementById('trajColor').value || "#ef4444";
            
            drawFullTrack(pathColor, 6, T5);

            if (document.getElementById('checkTrajectory').checked) {
                drawFullTrack(trajColor, 4, isSimulating ? t : T5);
            }

            let fontSize = parseInt(document.getElementById('labelFontSize').value) || 11;
            let dp = parseInt(document.getElementById('decimalPlaces').value) || 2;
            let vSpaceStart = parseFloat(document.getElementById('vspace_start').value) || 15;
            let vSpaceRepeat = parseInt(document.getElementById('vspace_repeat').value) || 3;
            let vSpaceInc = parseFloat(document.getElementById('vspace_inc').value) || 5;

            ctx.font = `bold ${fontSize}px Segoe UI`; 
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            
            for(let i = 0; i < trails.length; i++) {
                let tr = trails[i];
                let px = offsetX + tr.x * scale;
                let py = offsetY - tr.y * scale;

                ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI*2);
                ctx.fillStyle = '#facc15'; ctx.fill();

                let dynamicVSpace = vSpaceStart + (i % (vSpaceRepeat + 1)) * vSpaceInc;
                let textX = px + 10;
                let textY = py - dynamicVSpace - 10;

                ctx.beginPath(); ctx.moveTo(px, py - 5); ctx.lineTo(px, textY + 5);
                ctx.strokeStyle = 'rgba(250, 204, 21, 0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

                let txtX = `${formatValue(tr.x, dp)} m (H)`;
                let txtY = `${formatValue(tr.y, dp)} m (V)`;
                let txtT = `${formatValue(tr.t, dp)}s`;
                
                let outStr = "";
                if (tr.phase === 4 && tr.deg !== undefined) outStr = `${txtT}, ${formatValue(tr.deg, 1)}°`;
                else if (tr.phase === 1 || tr.phase === 3 || tr.phase === 5) outStr = `${txtX}, ${txtT}`;
                else outStr = `${txtX}, ${txtY}, ${txtT}`;

                let textWidth = ctx.measureText(outStr).width;
                ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                ctx.fillRect(textX - 4, textY - fontSize, textWidth + 8, fontSize*2);
                
                ctx.fillStyle = '#fefce8'; ctx.fillText(outStr, textX, textY);
            }

            if (t > 0 || (!isSimulating && t===0)) {
                let st = getState(t);
                let st2 = getState(Math.min(t + 0.01, T5));
                let angle = Math.atan2(-(st2.y - st.y), st2.x - st.x);
                let px = offsetX + st.x * scale;
                let py = offsetY - st.y * scale;

                if (isSimulating && document.getElementById('checkFollow').checked) {
                    container.scrollLeft = px - container.clientWidth / 2;
                    container.scrollTop = py - container.clientHeight / 2;
                }

                let spriteType = document.getElementById('spriteSelect').value;
                let isCharacter = ['knuckles', 'shadow', 'sonic'].includes(spriteType);
                let img = null;
                let sSize = 45; 
                let isBall = false;

                if (isCharacter) {
                    isBall = (isSimulating && t > 0);
                    img = images[spriteType + (isBall ? 'Ball' : '')];
                } else {
                    img = images[spriteType];
                }
                
                ctx.save();
                if (isCharacter && isBall) {
                    ctx.translate(px, py); ctx.rotate(angle); ctx.translate(0, -sSize/2); 
                    ctx.rotate(t * 50);
                    if (img && img.complete) ctx.drawImage(img, -sSize/2, -sSize/2, sSize, sSize);
                    else {
                        ctx.fillStyle = spriteType === 'sonic' ? '#3b82f6' : '#ef4444';
                        ctx.beginPath(); ctx.arc(0, 0, sSize/2, 0, Math.PI*2); ctx.fill();
                    }
                } else {
                    ctx.translate(px, py); ctx.rotate(angle);
                    if (img && img.complete) ctx.drawImage(img, -sSize/2, -sSize, sSize, sSize);
                    else {
                        ctx.fillStyle = '#ef4444'; ctx.fillRect(-20, -20, 40, 20);
                    }
                }
                ctx.restore();
            }
        }

        function drawStatic() {
            let oldT5 = typeof T5 !== 'undefined' ? T5 : 0;
            calculateLimits(); 
            
            if (!isSimulating && t > 0) {
                if (t >= oldT5 - 0.1) t = T5; 
                else t = Math.min(t, T5);
                regenerateTrails();
            }
            
            updateScaling();
            if(!isSimulating) drawSim();
        }

        function buildTableHTML(title, tStart, tEnd, isLoop) {
            let interval = document.getElementById('checkTrail').checked ? 
                (parseFloat(document.getElementById('inputInterval').value) || 0.5) : 0.5;
            let dp = parseInt(document.getElementById('decimalPlaces').value) || 2;
            
            let html = `<div class="analysis-section"><div class="analysis-header">${title}</div><div style="overflow-x: auto;"><table>
                            <thead><tr><th>Time (s)</th><th>Position X (m) (H)</th><th>Position Y (m) (V)</th>
                            ${isLoop ? '<th>Angle (°)</th>' : ''}</tr></thead><tbody>`;
            
            for(let currT = tStart; currT <= tEnd + 0.001; currT += interval) {
                let st = getState(currT);
                html += `<tr><td>${formatValue(currT, dp)}</td><td>${formatValue(st.x, dp)} (H)</td><td>${formatValue(st.y, dp)} (V)</td>
                        ${isLoop ? `<td>${st.deg !== undefined ? formatValue(st.deg, 1) + '°' : '-'}</td>` : ''}</tr>`;
            }
            return html + `</tbody></table></div></div>`;
        }

        function showAnalysis() {
            if (T1 === undefined) calculateLimits();
            let dp = parseInt(document.getElementById('decimalPlaces').value) || 2;
            let mass = parseFloat(document.getElementById('mass').value) || 500;
            let d1 = parseFloat(document.getElementById('lin1_d').value) || 90;
            let drop_h = parseFloat(document.getElementById('drop_h').value) || 60;
            let d2 = parseFloat(document.getElementById('lin2_d').value) || 50;
            let r_loop = parseFloat(document.getElementById('loop_r').value) || 20;

            let html = `
                <div class="analysis-section">
                    <div class="analysis-header">LINEAR MOTION 1</div>
                    <div class="answers-box"><p><strong>Final Velocity:</strong> ${formatValue(v1, dp)} m/s</p><p><strong>Time to reach ${d1}m:</strong> ${formatValue(T1, dp)} s</p></div>
                </div>
            ` + buildTableHTML("Motion Table - Linear Motion 1", 0, T1, false);

            let t2 = Math.sqrt((2 * drop_h) / g);
            let drop_w = v1 * t2;
            
            html += `
                <div class="analysis-section">
                    <div class="analysis-header">PROJECTILE MOTION (Drop)</div>
                    <div class="answers-box"><p><strong>Horizontal Range:</strong> ${formatValue(drop_w, dp)} m</p><p><strong>Time of Flight (end of drop):</strong> ${formatValue(t2, dp)} s</p><p><strong>Resultant Velocity at bottom:</strong> ${formatValue(v_trans, dp)} m/s</p></div>
                </div>
            ` + buildTableHTML("Motion Table - Projectile Motion - Type 1", T1, T2, false);

            html += `
                <div class="analysis-section">
                    <div class="analysis-header">LINEAR MOTION 2</div>
                    <div class="answers-box"><p><strong>Final Velocity:</strong> ${formatValue(v_trans, dp)} m/s</p><p><strong>Time to reach ${d2}m:</strong> ${formatValue(T3 - T2, dp)} s</p></div>
                </div>
            ` + buildTableHTML("Motion Table - Linear Motion 2", T2, T3, false);

            let ac = (v_trans * v_trans) / r_loop;
            let Fc = mass * ac;
            html += `
                <div class="analysis-section">
                    <div class="analysis-header">CIRCULAR MOTION</div>
                    <div class="answers-box"><p><strong>Centripetal Acceleration (a_c):</strong> ${formatValue(ac, dp)} m/s²</p><p><strong>Centripetal Force (F_c):</strong> ${formatValue(Fc, dp)} N</p><p><strong>Time for full revolution (T):</strong> ${formatValue(T4 - T3, dp)} s</p></div>
                </div>
            ` + buildTableHTML("Motion Table - Circular Motion", T3, T4, true);

            html += `
                <div class="analysis-section">
                    <div class="analysis-header">OVERALL</div>
                    <div class="answers-box"><p><strong>Time to complete entire track (up to loop):</strong> ${formatValue(T4, dp)} s</p><p><strong>Overall Time Simulation length:</strong> ${formatValue(T5, dp)} s</p></div>
                </div>
            `;

            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisModal').style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            if (images['night']) drawStatic(); 
        });
    </script>
</body>
</html>
